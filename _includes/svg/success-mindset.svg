<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Success mindset illustration">
  <!-- Compass rose -->
  <circle cx="70" cy="70" r="42" stroke="currentColor" stroke-width="1.6" fill="currentColor" fill-opacity="0.05"/>
  <circle cx="70" cy="70" r="34" stroke="currentColor" stroke-width="0.9" stroke-dasharray="2 3" opacity="0.5"/>
  <!-- Cardinal ticks -->
  <g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
    <line x1="70" y1="32" x2="70" y2="38"/>
    <line x1="70" y1="102" x2="70" y2="108"/>
    <line x1="32" y1="70" x2="38" y2="70"/>
    <line x1="102" y1="70" x2="108" y2="70"/>
  </g>
  <!-- N letter -->
  <text x="70" y="28" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="9" fill="currentColor">N</text>
  <!-- Compass needle (asymmetric, leaning toward N-E — north + ambition) -->
  <path d="M 70 70 L 90 38 L 70 70 Z" fill="currentColor"/>
  <path d="M 70 70 L 50 102 L 70 70 Z" fill="currentColor" opacity="0.45"/>
  <!-- Pivot dot -->
  <circle cx="70" cy="70" r="3" fill="currentColor" stroke="currentColor" stroke-width="0.5"/>
  <circle cx="70" cy="70" r="1" fill="#faf6ee"/>
</svg>
