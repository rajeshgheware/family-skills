<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="AI skills illustration">
  <!-- Neural network: 3 layers -->
  <g stroke="currentColor" stroke-width="0.9" opacity="0.5">
    <!-- Layer 1 -> 2 -->
    <line x1="25" y1="40" x2="70" y2="35"/>
    <line x1="25" y1="40" x2="70" y2="70"/>
    <line x1="25" y1="40" x2="70" y2="105"/>
    <line x1="25" y1="70" x2="70" y2="35"/>
    <line x1="25" y1="70" x2="70" y2="70"/>
    <line x1="25" y1="70" x2="70" y2="105"/>
    <line x1="25" y1="100" x2="70" y2="35"/>
    <line x1="25" y1="100" x2="70" y2="70"/>
    <line x1="25" y1="100" x2="70" y2="105"/>
    <!-- Layer 2 -> 3 -->
    <line x1="70" y1="35" x2="115" y2="55"/>
    <line x1="70" y1="35" x2="115" y2="85"/>
    <line x1="70" y1="70" x2="115" y2="55"/>
    <line x1="70" y1="70" x2="115" y2="85"/>
    <line x1="70" y1="105" x2="115" y2="55"/>
    <line x1="70" y1="105" x2="115" y2="85"/>
  </g>
  <!-- Highlighted active path (the prompt that gets the right answer) -->
  <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="25" y1="70" x2="70" y2="70"/>
    <line x1="70" y1="70" x2="115" y2="55"/>
  </g>
  <!-- Nodes -->
  <g fill="currentColor">
    <circle cx="25" cy="40" r="4"/>
    <circle cx="25" cy="70" r="5"/>
    <circle cx="25" cy="100" r="4"/>
    <circle cx="70" cy="35" r="4"/>
    <circle cx="70" cy="70" r="5.5"/>
    <circle cx="70" cy="105" r="4"/>
    <circle cx="115" cy="55" r="5"/>
    <circle cx="115" cy="85" r="4"/>
  </g>
  <!-- Halo ring around active output -->
  <circle cx="115" cy="55" r="9" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" fill="none" opacity="0.6"/>
</svg>
