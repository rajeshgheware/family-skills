<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Resilience illustration">
  <!-- A waveform that dips and recovers higher -->
  <path d="M 15 70 Q 30 70, 38 70 Q 45 70, 52 95 Q 58 110, 68 90 Q 76 70, 84 50 Q 92 32, 102 32 Q 115 32, 125 32"
        stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Reference baseline -->
  <line x1="15" y1="70" x2="125" y2="70" stroke="currentColor" stroke-width="0.9" stroke-dasharray="2 4" opacity="0.45"/>
  <!-- The dip (lowest point) marked -->
  <circle cx="58" cy="106" r="3" fill="currentColor"/>
  <text x="58" y="125" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="9" fill="currentColor" opacity="0.7">fall</text>
  <!-- The recovered peak marked -->
  <circle cx="100" cy="32" r="3" fill="currentColor"/>
  <text x="105" y="22" font-family="Georgia, serif" font-style="italic" font-size="9" fill="currentColor" opacity="0.85">rise</text>
  <!-- Sapling at the new peak -->
  <g stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="100" y1="32" x2="100" y2="20"/>
    <path d="M 100 26 Q 96 22, 95 18"/>
    <path d="M 100 26 Q 104 22, 105 18"/>
  </g>
</svg>
