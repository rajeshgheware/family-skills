<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Financial literacy illustration">
  <!-- A coin sprouting a tree (compounding) -->
  <!-- Soil line -->
  <line x1="20" y1="105" x2="120" y2="105" stroke="currentColor" stroke-width="1.4"/>
  <!-- Coin embedded in soil -->
  <ellipse cx="70" cy="105" rx="22" ry="8" stroke="currentColor" stroke-width="1.6" fill="currentColor" fill-opacity="0.1"/>
  <text x="70" y="109" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="currentColor">₹</text>
  <!-- Trunk -->
  <path d="M 70 95 Q 68 75, 70 55 Q 72 40, 70 25" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Branches -->
  <path d="M 70 70 Q 60 65, 52 55" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M 70 60 Q 80 55, 88 45" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M 70 45 Q 62 40, 56 32" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 70 38 Q 78 33, 84 26" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Leaves as small circles (with growing ones bigger up high) -->
  <g fill="currentColor">
    <circle cx="52" cy="55" r="3.5"/>
    <circle cx="88" cy="45" r="3.5"/>
    <circle cx="56" cy="32" r="2.6"/>
    <circle cx="84" cy="26" r="2.6"/>
    <circle cx="70" cy="22" r="3"/>
  </g>
  <!-- Growth arrows (compounding visual) -->
  <path d="M 100 90 Q 105 70, 110 50" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.5" fill="none"/>
  <path d="M 108 50 L 110 50 L 112 56" stroke="currentColor" stroke-width="1" opacity="0.5" fill="none"/>
</svg>
